name: Daily ETF Scrape

on:
  schedule:
    # 每天北京时间上午 9:00 运行 (UTC 时间 1:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允许手动点击运行按钮进行测试

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 运行爬虫脚本
      env:
        FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      run: python scrape_etf.py

    - name: 保存抓取结果
      # 将生成的 JSON 文件作为 Artifact 保存，可在 Actions 页面下载
      uses: actions/upload-artifact@v4
      with:
        name: etf-json-data
        path: etf_data.json

    - name: 自动提交数据到仓库 (可选)
      # 如果你想把每天的数据直接存入 Git 仓库
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add etf_data.json
        git commit -m "Update ETF data: $(date +'%Y-%m-%d')" || exit 0
        git push
